global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus selbst
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Host-Metriken (CPU, RAM, Disk, Netzwerk)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Docker-Container-Metriken
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # Pushgateway: n8n-Workflows und externe Metriken (O365, Solar, SPS)
  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
