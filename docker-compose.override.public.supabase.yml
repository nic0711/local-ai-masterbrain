services:
  # Kong: ports nicht nach außen, 2 Worker reichen für lokalen Betrieb (default: 8)
  kong:
    ports: !reset null
    environment:
      KONG_NGINX_WORKER_PROCESSES: "2"

  supavisor:
    ports: !reset null

  # Daten-Volume ist PG15-initialisiert; Image auf 15.x pinnen bis Migration durchgeführt wird
  db:
    image: supabase/postgres:15.8.1.085

  # TOTP / MFA für GoTrue aktivieren
  auth:
    environment:
      GOTRUE_MFA_ENABLED: "true"
      GOTRUE_MFA_TOTP_ENABLED: "true"
      GOTRUE_MFA_TOTP_ISSUER: "Local AI Masterbrain"
      GOTRUE_MFA_MAX_ENROLLED_FACTORS: "10"
