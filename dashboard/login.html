<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Local AI Masterbrain</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h2>Dashboard Login</h2>
            <form id="login-form">
                <!-- Schritt 1: Email + Passwort -->
                <div id="password-step">
                    <input type="email" id="email" placeholder="Email" autocomplete="email" required>
                    <input type="password" id="password" placeholder="Passwort" autocomplete="current-password" required>
                    <button type="submit">Anmelden</button>
                </div>
                <!-- Schritt 2: TOTP-Code (wird nach erfolgreichem Passwort eingeblendet) -->
                <div id="totp-step" class="hidden">
                    <p class="totp-hint">Bitte gib den 6-stelligen Code aus deiner Authenticator-App ein.</p>
                    <input type="text" id="totp-code" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
                    <button type="submit">Code bestätigen</button>
                </div>
            </form>
            <p id="error-message" class="error-message"></p>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.97.0/dist/umd/supabase.js"
            integrity="sha384-qRSFs/sWgpA39YnhiB3MWWl2wAbW1gSt+ZcLg2rvFNCDCTMuAi3c9aTIt6MvXhDA"
            crossorigin="anonymous"></script>
    <script src="auth.js"></script>
</body>
</html>
